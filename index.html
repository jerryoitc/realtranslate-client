<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RealTranslate 即時字幕同步</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --accent-color: #00e5ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #header {
            padding: 15px;
            background: #1e1e1e;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        #status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            background: #ff5252; /* Default: Disconnected */
        }

        #status-dot.connected { background: #4caf50; }

        #container {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 字幕從底部往上推 */
            overflow-y: auto;
        }

        .subtitle-line {
            font-size: 28px;
            font-weight: bold;
            line-height: 1.5;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            word-wrap: break-word;
        }

        .history { color: var(--text-primary); opacity: 0.6; }
        .current { color: var(--text-primary); border-left: 4px solid var(--accent-color); padding-left: 10px; }

        #no-room {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 80%;
        }

        .loading-spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--accent-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="header">
        <div><span id="status-dot"></span> <span id="room-display">等待連線...</span></div>
        <div style="color: #666;">RealTranslate v34</div>
    </div>

    <div id="container">
        <div id="subtitles">
            <div class="subtitle-line current" id="live-text">請在電腦端開啟辨識...</div>
        </div>
    </div>

    <div id="no-room" style="display:none;">
        <div class="loading-spinner"></div>
        <h2>未指定房間 ID</h2>
        <p style="color:#888;">請掃描電腦端的 QR Code 進入</p>
    </div>

    <script>
        // 1. Firebase 配置 (需與 Python 端 FIREBASE_URL 對應)
        const firebaseConfig = {
            databaseURL: "https://realtranslate-3bd83-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. 解析網址 Room ID
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');

        if (!roomId) {
            document.getElementById('no-room').style.display = 'block';
        } else {
            document.getElementById('room-display').innerText = `房間: ${roomId}`;
            const subtitleRef = db.ref(`rooms/${roomId}/subtitle`);
            const statusDot = document.getElementById('status-dot');

            // 監聽字幕變動
            subtitleRef.on('value', (snapshot) => {
                const data = snapshot.val();
                statusDot.classList.add('connected');
                
                if (data) {
                    const liveText = document.getElementById('live-text');
                    const text = data.text || data.translated || "";
                    
                    if (data.isFinal) {
                        // 定稿：將目前的文字變為歷史，並清空預覽區
                        // 簡單實作：直接更新，並增加淡入效果
                        liveText.style.opacity = 1;
                        liveText.innerText = text;
                    } else {
                        // 預覽：即時更新文字內容
                        liveText.innerText = text;
                        liveText.style.opacity = 0.8;
                    }
                    
                    // 自動滾動到底部
                    window.scrollTo(0, document.body.scrollHeight);
                }
            }, (error) => {
                statusDot.classList.remove('connected');
                console.error("Firebase 讀取失敗:", error);
            });
        }

        // 防止手機螢幕自動休眠 (選配)
        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').catch(console.error);
        }
    </script>
</body>
</html>
